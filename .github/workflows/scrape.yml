name: PEI Infrastructure Intelligence — Daily Scrape

on:
  schedule:
    # Run every 6 hours, offset from TII to stagger GitHub Actions load
    - cron: '15 0,6,12,18 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Required to push JSON output files

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run PEI scraper
        run: python pii_scraper.py

      - name: Commit and push data files
        run: |
          git config user.name  "PII Bot"
          git config user.email "actions@github.com"
          git add pii_data_*.json
          git diff --cached --quiet || git commit -m "data: PEI infrastructure snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

